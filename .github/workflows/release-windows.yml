name: Release Windows GUI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build TrackerGUI for Windows
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.9.3
        with:
          pixi-version: v0.63.0
          cache: true

      - name: Install location-tracker environment
        run: pixi install -e location-tracker

      - name: Build folder-style GUI release
        shell: pwsh
        run: |
          pixi run -e location-tracker python -m PyInstaller packaging/TrackerGUI.spec --noconfirm --clean
          if (!(Test-Path "dist/TrackerGUI/TrackerGUI.exe")) {
            throw "Build did not create dist/TrackerGUI/TrackerGUI.exe"
          }

      - name: Create release archive
        shell: pwsh
        run: |
          Compress-Archive -Path dist/TrackerGUI/* -DestinationPath TrackerGUI-Windows.zip -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: TrackerGUI-Windows
          path: TrackerGUI-Windows.zip

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: TrackerGUI-Windows.zip
